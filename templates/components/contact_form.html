<form class="contact-form" method="POST" action="{{ url_for('contact') }}">

  <div class="form-field">
    <label for="name">{{ t('contact.form.name') }} *</label>
    <input type="text" id="name" name="name" required>
  </div>

  <div class="form-field">
    <label for="email">{{ t('contact.form.email') }} *</label>
    <input type="email" id="email" name="email" required>
  </div>

  <div class="form-field">
    <label for="phone">{{ t('contact.form.phone') }}</label>
    <input type="tel" id="phone" name="phone">
  </div>

  <div class="form-field">
    <label for="subject">{{ t('contact.form.subject') }}</label>
    <select id="subject" name="subject">
      <option value="product">{{ t('contact.form.subject.product') }}</option>
      <option value="training">{{ t('contact.form.subject.training') }}</option>
      <option value="consultation">{{ t('contact.form.subject.consultation') }}</option>
      <option value="other">{{ t('contact.form.subject.other') }}</option>
    </select>
  </div>

  <div class="form-field">
    <label for="message">{{ t('contact.form.message') }} *</label>
    <textarea id="message" name="message" required></textarea>
  </div>

  <button type="submit" class="btn btn--primary">{{ t('contact.form.submit') }}</button>

</form>
